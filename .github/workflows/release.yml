name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so release notes can diff against the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Derive version from tag
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z (got '${{ github.ref_name }}')" }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      # The committed productVersion is the 0.0.0 dev marker; the git tag is the
      # single source of truth, patched in here so the Windows file metadata picks
      # it up (see docs/adr/0011, docs/adr/0013).
      - name: Patch wails.json productVersion
        run: |
          $j = Get-Content wails.json -Raw | ConvertFrom-Json
          $j.info.productVersion = $env:VERSION
          $j | ConvertTo-Json -Depth 10 | Set-Content wails.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      # Velopack's Go binding links Velopack's static Rust libs, which reference
      # ntdll's Nt* syscalls; the binding omits -lntdll so cgo must supply it
      # (env var only — a per-package #cgo directive lands in the wrong link
      # order). See docs/adr/0013 and memory velopack-go-ntdll-link.
      - name: Build app binary
        env:
          CGO_LDFLAGS: -lntdll
        run: wails build -platform windows/amd64 -ldflags "-X gobchat-log-browser/internal/version.Version=$env:VERSION"

      # Pull the previous release's packages so vpk can compute a delta against
      # them. Harmless (and skipped) when there is no prior Velopack release yet.
      - name: Download prior releases for delta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path release_out | Out-Null
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GITHUB_TOKEN `
            --outputDir release_out
        continue-on-error: true

      # packId is the stable Velopack identity (install dir
      # %LocalAppData%\Gobchat-Log-Browser); --framework webview2 makes
      # Setup.exe install the Evergreen WebView2 runtime if it is missing,
      # replacing the bootstrapper the old NSIS installer bundled.
      - name: Package with Velopack
        run: |
          vpk pack `
            --packId Gobchat-Log-Browser `
            --packVersion $env:VERSION `
            --packTitle "Gobchat Log Browser" `
            --packAuthors Shuro `
            --packDir build\bin `
            --mainExe gobchat-log-browser.exe `
            --icon build\windows\icon.ico `
            --framework webview2 `
            --outputDir release_out

      # Release notes are the commit subjects since the previous tag, limited to
      # changes that affect the program itself (docs/chore/ci/test are dropped).
      - name: Generate release notes from commits
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($LASTEXITCODE -ne 0) { $prev = $null }
          $range = if ($prev) { "$prev..$tag" } else { $tag }
          $bullets = git log $range --no-merges --pretty=format:'%s' |
            Where-Object { $_ -and $_ -notmatch '^(docs|chore|ci|test|style)(\(.*\))?:' } |
            ForEach-Object { "- $_" }
          if (-not $bullets) { $bullets = @("- Maintenance release.") }
          $notes = @("## Changes", "") + $bullets
          if ($prev) {
            $notes += @("", "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...$tag")
          }
          $notes -join "`n" | Set-Content RELEASE_NOTES.md
          Get-Content RELEASE_NOTES.md

      # Setup.exe = installer; *.nupkg + releases.win.json = the update feed the
      # in-app updater reads from releases/latest/download; *-Portable.zip = the
      # no-install build. These names are the contract the updater resolves
      # against — change them only together with internal/velopackupd.
      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            release_out/*-Setup.exe
            release_out/*-full.nupkg
            release_out/*-delta.nupkg
            release_out/*-Portable.zip
            release_out/releases.win.json
