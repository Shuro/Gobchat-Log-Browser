name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so release notes can diff against the previous tag.
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Derive version from tag
        run: |
          $v = "${{ github.ref_name }}".TrimStart("v")
          if ($v -notmatch '^\d+\.\d+\.\d+$') { throw "Tag must be vX.Y.Z (got '${{ github.ref_name }}')" }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append

      # The committed productVersion is the 0.0.0 dev marker; the git tag is the
      # single source of truth, patched in here so the Windows file metadata and
      # NSIS VIProductVersion pick it up (see docs/adr/0011).
      - name: Patch wails.json productVersion
        run: |
          $j = Get-Content wails.json -Raw | ConvertFrom-Json
          $j.info.productVersion = $env:VERSION
          $j | ConvertTo-Json -Depth 10 | Set-Content wails.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # NSIS is not on the runner image; the choco package also doesn't shim
      # makensis onto PATH, so expose the install dir to later steps explicitly.
      - name: Ensure NSIS
        run: |
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            choco install nsis -y
            "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
            "${env:ProgramFiles(x86)}\NSIS\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: Build portable exe and NSIS installer
        run: wails build -platform windows/amd64 -nsis -ldflags "-X gobchat-log-browser/internal/version.Version=$env:VERSION"

      # Asset names are a fixed convention the future in-app update check
      # resolves against — change them only together with the updater.
      - name: Package release assets
        run: |
          Compress-Archive -Path build\bin\gobchat-log-browser.exe -DestinationPath "build\bin\gobchat-log-browser-v$env:VERSION-windows-amd64-portable.zip"
          Move-Item build\bin\gobchat-log-browser-amd64-installer.exe "build\bin\gobchat-log-browser-v$env:VERSION-windows-amd64-installer.exe"

      # Release notes are the commit subjects since the previous tag, limited to
      # changes that affect the program itself (docs/chore/ci/test are dropped).
      - name: Generate release notes from commits
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = git describe --tags --abbrev=0 "$tag^" 2>$null
          if ($LASTEXITCODE -ne 0) { $prev = $null }
          $range = if ($prev) { "$prev..$tag" } else { $tag }
          $bullets = git log $range --no-merges --pretty=format:'%s' |
            Where-Object { $_ -and $_ -notmatch '^(docs|chore|ci|test|style)(\(.*\))?:' } |
            ForEach-Object { "- $_" }
          if (-not $bullets) { $bullets = @("- Maintenance release.") }
          $notes = @("## Changes", "") + $bullets
          if ($prev) {
            $notes += @("", "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$prev...$tag")
          }
          $notes -join "`n" | Set-Content RELEASE_NOTES.md
          Get-Content RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build/bin/gobchat-log-browser-v*-windows-amd64-portable.zip
            build/bin/gobchat-log-browser-v*-windows-amd64-installer.exe
